<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
星降る短冊 - 願いの庭
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- =====================
     オープニング
===================== -->

<div id="opening">

<h1>
願いを夜空へ
</h1>

</div>



<!-- 月 -->

<div class="moon"></div>



<!-- 流れ星 -->

<div class="shooting-star"></div>




<main class="container">



<h2>
🌌 星降る短冊
</h2>


<p>
あなたの願いを夜空へ結ぼう
</p>



<!-- =====================
     短冊
===================== -->


<div class="tanzaku">


<div class="selected-icon">
⭐
</div>


<textarea
placeholder="ここに願いを書いてください…">
</textarea>



</div>





<!-- =====================
     色選択
===================== -->


<h3>
🎨 短冊の色
</h3>


<div class="colors">


<button></button>

<button></button>

<button></button>

<button></button>


</div>





<!-- =====================
     アイコン
===================== -->


<h3>
✨ 願いの印
</h3>


<div class="icons">


<button>⭐</button>

<button>🌙</button>

<button>🌸</button>

<button>🎋</button>

<button>💫</button>


</div>





<!-- =====================
     操作
===================== -->


<div class="buttons">


<button id="submit">

🌠 願いを結ぶ

</button>



<button id="view">

🌌 みんなの願い

</button>



<button onclick="unlock()">

🔒 合言葉

</button>


</div>




</main>




<!-- =====================
     風鈴・音追加予定
===================== -->


<audio
id="wind-chime"
loop>

</audio>



<audio
id="insects"
loop>

</audio>





<script src="script.js"></script>


</body>


</html>
