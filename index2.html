<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
星降る短冊 - 願いの庭
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="opening">
<h1>願いを夜空へ</h1>
</div>



<div class="moon"></div>


<div class="shooting-star"></div>




<main class="container">


<h2>
🌌 星降る短冊
</h2>


<p>
あなたの願いを笹へ結ぼう
</p>




<!-- 笹 -->

<div class="bamboo">


<div class="branch"></div>


<div id="wish-area">

</div>


</div>





<!-- 入力用短冊 -->

<div class="tanzaku">


<div class="selected-icon">
⭐
</div>


<textarea
placeholder="夜空へ届けたい願いを書く…">
</textarea>


</div>





<h3>
🎨 短冊の色
</h3>


<div class="colors">

<button></button>
<button></button>
<button></button>
<button></button>

</div>





<h3>
✨ 願いの印
</h3>


<div class="icons">

<button>⭐</button>
<button>🌙</button>
<button>🌸</button>
<button>🎋</button>
<button>💫</button>

</div>





<button id="submit">
🌠 願いを結ぶ
</button>



<button id="view">
🌌 みんなの願い
</button>



<button onclick="unlock()">
🔒 合言葉
</button>




</main>



<script src="script.js"></script>


</body>

</html>
